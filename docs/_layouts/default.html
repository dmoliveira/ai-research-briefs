<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/rss.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-tagline">AI/ML research digests for engineers, builders, and applied research teams.</p>
      </header>
      <main class="content">
        {{ content }}
      </main>
      <footer class="site-footer">
        <p>Published as a public GitHub Pages archive.</p>
      </footer>
    </div>
  </body>
</html>
